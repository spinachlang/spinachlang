[project]
name = "spinachlang"
version = "0.3.0"
description = "A quantum programming language and compiler."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Cedrick Gauthier", email = "spinachlang@proton.me" }]

dependencies = [
  "lark==1.2.2",
  "pytket==2.15.0",
  "pytyping==0.0.1",
  "pydantic==2.11.7",
  "pathlib==1.0.1",
  "pygls==2.0.1",
  "lsprotocol==2025.0.0",
]

[project.scripts]
spinachlang = "spinachlang.main:main"
spinachlang-lsp = "spinachlang.lsp_main:main"

[project.optional-dependencies]
backends = [
  "pytket-cirq==0.40.0",
  "pytket-pyquil==0.40.0",
  "pytket-qiskit==0.71.0",
  "pytket-pennylane==0.20.0",
  "pytket-braket==0.43.0",
  "pytket-qir==0.24.1",
]
dev = ["pylint>=3.2.0", "pytest>=8.3.0"]

[tool.setuptools]
include-package-data = true

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

